name: Frontend CI/CD

on:
  push:
    branches:
      - main
      - master
      - front-react
  pull_request:
    branches:
      - main
      - master

jobs:
  deploy-frontend:
    name: Build e deploy frontend
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    env:
      AWS_REGION: us-east-1
      S3_BUCKET: case-intelbras-frontend-533267264899
      CLOUDFRONT_DISTRIBUTION_ID: E2E324C9WD97G0
      VITE_API_BASE_URL: http://case-intelbras-alb-1188732327.us-east-1.elb.amazonaws.com

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Build React
        run: npm run build

      - name: Configurar credenciais AWS via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::533267264899:role/case-intelbras-github-actions-frontend-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy para S3
        run: aws s3 sync dist/ s3://${{ env.S3_BUCKET }} --delete

      - name: Invalidar cache CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ env.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
